<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<h1>JAVA SCRIPT LOOPING</h1>
<p id="demo"> </p>

<script>

var fruits =  ["Apple", "Banana", "Mango", "Orange", "Grapes", "Watermellom", "Pineapple"];

for ( var i = 0; i <fruits.length; i++){
  var text =fruits [i];
  document.getElementById("demo").innerHTML +=text + "<br>";
  document.write(text + "<br>");


}




</script>





</body>
</html>
